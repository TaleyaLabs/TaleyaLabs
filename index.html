<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaleyaLabs LLC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* ── Hero Text ── */
    .hero-title {
      color: #67e8f9;
      text-shadow:
        0 0 8px rgba(103, 232, 249, 0.5),
        0 0 20px rgba(103, 232, 249, 0.25),
        0 0 40px rgba(192, 38, 211, 0.1);
      animation: heroGlow 4s ease-in-out infinite alternate;
    }

    @keyframes heroGlow {
      0%   { text-shadow: 0 0 8px rgba(103,232,249,0.5), 0 0 20px rgba(103,232,249,0.25), 0 0 40px rgba(192,38,211,0.1); }
      100% { text-shadow: 0 0 12px rgba(103,232,249,0.6), 0 0 30px rgba(103,232,249,0.3), 0 0 50px rgba(192,38,211,0.15); }
    }

    .tagline {
      color: #a5f3fc;
      text-shadow: 0 0 15px rgba(103, 232, 249, 0.4);
    }

    /* ── Header ── */
    .header-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 40;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
    }

    /* ── Mouse-reactive glow ── */
    .cursor-glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(103,232,249,0.08) 0%, rgba(192,38,211,0.04) 40%, transparent 70%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 1;
      transition: left 0.3s ease-out, top 0.3s ease-out;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center relative">

  <!-- Canvas for star field -->
  <canvas id="starfield"></canvas>

  <!-- Mouse-reactive glow -->
  <div id="cursorGlow" class="cursor-glow"></div>

  <!-- Header: Hamburger + TaleyaLabs LLC -->
  <div class="header-bar">
    <button onclick="toggleMenu()" class="text-white text-3xl hover:text-cyan-400 transition-colors" aria-label="Open menu">
      ☰
    </button>
    <span class="text-white text-lg font-medium tracking-wide">TaleyaLabs LLC</span>
  </div>

  <!-- Main Content -->
  <div class="relative text-center px-6" style="z-index: 10;">
    <h1 class="hero-title text-7xl md:text-9xl font-bold tracking-tighter mb-6">
      TaleyaLabs
    </h1>
    <p class="tagline text-2xl md:text-3xl mb-6 tracking-widest">
      Design &bull; Develop &bull; Deploy
    </p>
  </div>

  <!-- Menu Overlay -->
  <div id="menu" class="hidden fixed inset-0 bg-black/95 z-50 flex items-center justify-center">
    <div class="absolute top-0 left-0 right-0 p-6 flex items-center gap-4">
      <button onclick="toggleMenu()" class="text-white text-3xl hover:text-cyan-400 transition-colors" aria-label="Close menu">
        ✕
      </button>
      <span class="text-white text-lg font-medium tracking-wide">TaleyaLabs LLC</span>
    </div>
    <div class="text-center space-y-8 text-2xl text-white">
      <a href="https://travenie.com" class="block hover:text-cyan-400 transition-colors">Travenie</a>
      <a href="#" class="block hover:text-cyan-400 transition-colors">djïrb</a>
      <a href="#" class="block hover:text-cyan-400 transition-colors">About Us</a>
      <a href="mailto:tech@taleyalabs.com" class="block hover:text-cyan-400 transition-colors">Contact</a>
      <div class="pt-8 text-sm text-gray-500">
        TaleyaLabs LLC<br>
        Design &bull; Develop &bull; Deploy
      </div>
    </div>
  </div>

  <script>
    // ════════════════════════════════════════════
    // STARFIELD — WebGL-grade canvas star system
    // ════════════════════════════════════════════
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let W, H;
    let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Track mouse for parallax + glow
    document.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      const glow = document.getElementById('cursorGlow');
      glow.style.left = e.clientX + 'px';
      glow.style.top  = e.clientY + 'px';
    });

    // ── Star classes ──
    class Star {
      constructor(layer) {
        this.layer = layer;    // 0=far, 1=mid, 2=near
        this.reset();
      }

      reset() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.baseSize = this.layer === 0 ? 0.5 + Math.random() * 0.8
                      : this.layer === 1 ? 1.0 + Math.random() * 1.2
                      :                    1.5 + Math.random() * 2.0;
        this.speed = this.layer === 0 ? 0.05
                   : this.layer === 1 ? 0.15
                   :                    0.35;
        this.parallax = this.layer === 0 ? 0.015
                      : this.layer === 1 ? 0.04
                      :                    0.08;
        this.twinkleSpeed = 0.5 + Math.random() * 2;
        this.twinkleOffset = Math.random() * Math.PI * 2;
        this.hue = Math.random() < 0.6 ? 185 + Math.random() * 10   // cyan
                 : Math.random() < 0.8 ? 280 + Math.random() * 20   // purple/magenta
                 :                        0;                          // white
        this.saturation = this.hue === 0 ? 0 : 60 + Math.random() * 40;
      }

      update(t) {
        // Drift upward slowly
        this.y -= this.speed;
        if (this.y < -10) { this.y = H + 10; this.x = Math.random() * W; }

        // Parallax from mouse
        const dx = (mouse.x - W / 2) * this.parallax;
        const dy = (mouse.y - H / 2) * this.parallax;
        this.drawX = this.x + dx;
        this.drawY = this.y + dy;

        // Twinkle
        this.alpha = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(t * this.twinkleSpeed + this.twinkleOffset));
        this.size = this.baseSize * (0.8 + 0.4 * Math.sin(t * this.twinkleSpeed * 0.7 + this.twinkleOffset));
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.drawX, this.drawY, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue}, ${this.saturation}%, 85%, ${this.alpha})`;
        ctx.fill();

        // Glow for near stars
        if (this.layer === 2 && this.alpha > 0.7) {
          ctx.beginPath();
          ctx.arc(this.drawX, this.drawY, this.size * 4, 0, Math.PI * 2);
          ctx.fillStyle = `hsla(${this.hue}, ${this.saturation}%, 70%, ${this.alpha * 0.08})`;
          ctx.fill();
        }
      }
    }

    // ── Comet / Shooting Star ──
    class ShootingStar {
      constructor() { this.reset(); this.active = false; }

      reset() {
        // Spawn from any edge — pick a random side
        const side = Math.floor(Math.random() * 4);
        const margin = 50;
        if (side === 0) {        // top
          this.x = Math.random() * W;
          this.y = -margin;
          this.angle = Math.PI / 6 + Math.random() * Math.PI / 3;  // downward
        } else if (side === 1) { // right
          this.x = W + margin;
          this.y = Math.random() * H * 0.7;
          this.angle = Math.PI * 0.6 + Math.random() * Math.PI / 3;  // leftward-down
        } else if (side === 2) { // left
          this.x = -margin;
          this.y = Math.random() * H * 0.7;
          this.angle = -Math.PI / 6 + Math.random() * Math.PI / 3;  // rightward-down
        } else {                 // bottom-corners (streak upward for variety)
          this.x = Math.random() < 0.5 ? Math.random() * W * 0.3 : W * 0.7 + Math.random() * W * 0.3;
          this.y = H + margin;
          this.angle = -Math.PI / 3 - Math.random() * Math.PI / 4;  // upward
        }
        this.speed = 12 + Math.random() * 16;
        this.alpha = 1;
        this.decay = 0.005 + Math.random() * 0.004;
        this.active = true;
        this.trail = [];
        this.maxTrail = 80 + Math.floor(Math.random() * 40);
        this.headSize = 3 + Math.random() * 2;
        this.curvature = (Math.random() - 0.5) * 0.002;
        this.currentAngle = this.angle;
      }

      update() {
        if (!this.active) return;
        this.currentAngle += this.curvature;
        this.x += Math.cos(this.currentAngle) * this.speed;
        this.y += Math.sin(this.currentAngle) * this.speed;
        this.alpha -= this.decay;

        // Store trail points with size that tapers
        this.trail.push({ x: this.x, y: this.y, a: this.alpha, s: this.headSize });
        if (this.trail.length > this.maxTrail) this.trail.shift();
        if (this.alpha <= 0 || this.x > W + 100 || this.y > H + 100) this.active = false;
      }

      draw() {
        if (!this.active || this.trail.length < 2) return;

        // ── Outer glow streak (wide, faint) ──
        ctx.beginPath();
        ctx.moveTo(this.trail[0].x, this.trail[0].y);
        for (let i = 1; i < this.trail.length; i++) {
          ctx.lineTo(this.trail[i].x, this.trail[i].y);
        }
        ctx.strokeStyle = `rgba(103, 232, 249, ${this.alpha * 0.06})`;
        ctx.lineWidth = 30;
        ctx.lineCap = 'round';
        ctx.stroke();

        // ── Mid glow streak ──
        ctx.beginPath();
        ctx.moveTo(this.trail[0].x, this.trail[0].y);
        for (let i = 1; i < this.trail.length; i++) {
          ctx.lineTo(this.trail[i].x, this.trail[i].y);
        }
        ctx.strokeStyle = `rgba(103, 232, 249, ${this.alpha * 0.15})`;
        ctx.lineWidth = 10;
        ctx.lineCap = 'round';
        ctx.stroke();

        // ── Core trail (thin, bright, tapering) ──
        for (let i = 1; i < this.trail.length; i++) {
          const t = this.trail[i];
          const prev = this.trail[i - 1];
          const pct = i / this.trail.length;  // 0 at tail, 1 at head

          ctx.beginPath();
          ctx.moveTo(prev.x, prev.y);
          ctx.lineTo(t.x, t.y);

          // Gradient from magenta at tail to cyan to white at head
          const r = Math.round(103 + (255 - 103) * pct * pct);
          const g = Math.round(232 + (255 - 232) * pct * pct);
          const b = Math.round(249 + (255 - 249) * pct * pct);
          ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${t.a * pct})`;
          ctx.lineWidth = 1 + pct * 3;
          ctx.lineCap = 'round';
          ctx.stroke();
        }

        // ── Sparkling debris particles along trail ──
        for (let i = 0; i < this.trail.length; i += 4) {
          const t = this.trail[i];
          const pct = i / this.trail.length;
          if (Math.random() > 0.6) {
            const offsetX = (Math.random() - 0.5) * 12;
            const offsetY = (Math.random() - 0.5) * 12;
            ctx.beginPath();
            ctx.arc(t.x + offsetX, t.y + offsetY, 0.5 + Math.random() * 1, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(192, 200, 255, ${t.a * pct * 0.6})`;
            ctx.fill();
          }
        }

        // ── Comet head — blazing bright ──
        // Outer corona
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.headSize * 8, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(103, 232, 249, ${this.alpha * 0.06})`;
        ctx.fill();

        // Mid glow
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.headSize * 4, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(103, 232, 249, ${this.alpha * 0.15})`;
        ctx.fill();

        // Inner glow
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.headSize * 2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(180, 240, 255, ${this.alpha * 0.4})`;
        ctx.fill();

        // White-hot core
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.headSize, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha * 0.95})`;
        ctx.fill();
      }
    }

    // ── Nebula clouds ──
    class Nebula {
      constructor() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.radius = 150 + Math.random() * 250;
        this.hue = Math.random() < 0.5 ? 190 : 285;
        this.driftX = (Math.random() - 0.5) * 0.1;
        this.driftY = (Math.random() - 0.5) * 0.05;
        this.pulseSpeed = 0.3 + Math.random() * 0.3;
        this.pulseOffset = Math.random() * Math.PI * 2;
      }

      update(t) {
        this.x += this.driftX;
        this.y += this.driftY;
        if (this.x < -this.radius) this.x = W + this.radius;
        if (this.x > W + this.radius) this.x = -this.radius;
        if (this.y < -this.radius) this.y = H + this.radius;
        if (this.y > H + this.radius) this.y = -this.radius;
        this.alpha = 0.02 + 0.015 * Math.sin(t * this.pulseSpeed + this.pulseOffset);
      }

      draw() {
        const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
        grad.addColorStop(0, `hsla(${this.hue}, 80%, 50%, ${this.alpha})`);
        grad.addColorStop(0.5, `hsla(${this.hue}, 60%, 30%, ${this.alpha * 0.5})`);
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.fillRect(this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
      }
    }

    // ── Initialize ──
    const stars = [];
    for (let i = 0; i < 300; i++) stars.push(new Star(0));  // far
    for (let i = 0; i < 150; i++) stars.push(new Star(1));  // mid
    for (let i = 0; i < 50;  i++) stars.push(new Star(2));  // near

    const nebulae = [];
    for (let i = 0; i < 5; i++) nebulae.push(new Nebula());

    // Multiple comets — up to 5 at once, streaking from all directions
    const comets = [];
    for (let i = 0; i < 5; i++) comets.push(new ShootingStar());
    let lastShot = 0;
    let nextInterval = 0.8 + Math.random() * 1.5;

    // ── Render loop ──
    function animate(timestamp) {
      const t = timestamp * 0.001;
      ctx.clearRect(0, 0, W, H);

      // Nebulae first (background)
      for (const n of nebulae) { n.update(t); n.draw(); }

      // Stars
      for (const s of stars) { s.update(t); s.draw(); }

      // Fire comets — stagger launches every 2-5 seconds
      if (t - lastShot > nextInterval) {
        const idle = comets.find(c => !c.active);
        if (idle) {
          idle.reset();
          lastShot = t;
          nextInterval = 0.8 + Math.random() * 1.5;
        }
      }

      for (const c of comets) { c.update(); c.draw(); }

      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);

    // ── Menu toggle ──
    function toggleMenu() {
      document.getElementById('menu').classList.toggle('hidden');
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') document.getElementById('menu').classList.add('hidden');
    });
  </script>
</body>
</html>
