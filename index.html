<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaleyaLabs LLC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: #000;
      overflow: hidden;
    }

    /* Full-bleed hero background */
    .hero-bg {
      position: fixed;
      inset: 0;
      background: url('./download.jpg') center center / cover no-repeat;
      z-index: 0;
    }

    /* Subtle darkening overlay so text pops */
    .hero-overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.5) 100%);
      z-index: 1;
    }

    .neon-text {
      color: #fff;
      text-shadow:
        0 0 20px rgba(103, 232, 249, 0.8),
        0 0 40px rgba(103, 232, 249, 0.5),
        0 0 80px rgba(192, 38, 211, 0.3);
      animation: neonPulse 4s infinite alternate;
    }

    @keyframes neonPulse {
      0%, 100% { text-shadow: 0 0 20px rgba(103,232,249,0.8), 0 0 40px rgba(103,232,249,0.5), 0 0 80px rgba(192,38,211,0.3); }
      50%      { text-shadow: 0 0 30px rgba(103,232,249,1),   0 0 60px rgba(103,232,249,0.7), 0 0 100px rgba(192,38,211,0.5); }
    }

    @keyframes particleFloat {
      0%   { transform: translateY(0)    translateX(0)    scale(1);   opacity: 0.4; }
      25%  { transform: translateY(-40px) translateX(20px) scale(1.1); opacity: 0.6; }
      50%  { transform: translateY(-80px) translateX(-20px) scale(0.9); opacity: 0.3; }
      75%  { transform: translateY(-120px) translateX(10px) scale(1.05); opacity: 0.5; }
      100% { transform: translateY(-160px) translateX(0)   scale(1);   opacity: 0; }
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: linear-gradient(to right, #67e8f9, #c026d3);
      animation: particleFloat 15s linear infinite;
      opacity: 0.4;
    }

    .header-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 40;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center relative">

  <!-- Full-bleed Hero Background -->
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>

  <!-- Floating Particles (subtle overlay on top of image) -->
  <div id="particles" class="fixed inset-0 pointer-events-none" style="z-index: 2;"></div>

  <!-- Header: Hamburger + TaleyaLabs LLC -->
  <div class="header-bar">
    <button onclick="toggleMenu()" class="text-white text-3xl hover:text-cyan-400 transition-colors" aria-label="Open menu">
      ☰
    </button>
    <span class="text-white text-lg font-medium tracking-wide">TaleyaLabs LLC</span>
  </div>

  <!-- Main Content -->
  <div class="relative text-center px-6" style="z-index: 10;">
    <h1 class="text-7xl md:text-9xl font-bold tracking-tighter neon-text mb-4">
      TaleyaLabs
    </h1>
    <p class="text-2xl md:text-3xl text-cyan-300 mb-6 tracking-widest" style="text-shadow: 0 0 10px rgba(103,232,249,0.5);">
      Design &bull; Develop &bull; Deploy
    </p>
  </div>

  <!-- Menu Overlay -->
  <div id="menu" class="hidden fixed inset-0 bg-black/95 z-50 flex items-center justify-center">
    <!-- Close Button + Title (mirrors header position) -->
    <div class="absolute top-0 left-0 right-0 p-6 flex items-center gap-4">
      <button onclick="toggleMenu()" class="text-white text-3xl hover:text-cyan-400 transition-colors" aria-label="Close menu">
        ✕
      </button>
      <span class="text-white text-lg font-medium tracking-wide">TaleyaLabs LLC</span>
    </div>
    <div class="text-center space-y-8 text-2xl text-white">
      <a href="https://travenie.com" class="block hover:text-cyan-400 transition-colors">Travenie</a>
      <a href="#" class="block hover:text-cyan-400 transition-colors">djïrb</a>
      <a href="#" class="block hover:text-cyan-400 transition-colors">About Us</a>
      <a href="mailto:tech@taleyalabs.com" class="block hover:text-cyan-400 transition-colors">Contact</a>
      <div class="pt-8 text-sm text-gray-500">
        TaleyaLabs LLC<br>
        Building the future, one system at a time.
      </div>
    </div>
  </div>

  <script>
    function createParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 40; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';

        const size = Math.random() * 4 + 2;
        particle.style.width  = `${size}px`;
        particle.style.height = `${size}px`;

        particle.style.left = `${Math.random() * 100}vw`;
        particle.style.top  = `${Math.random() * 100}vh`;

        particle.style.animationDuration = `${Math.random() * 20 + 15}s`;
        particle.style.animationDelay    = `-${Math.random() * 15}s`;

        container.appendChild(particle);
      }
    }

    function toggleMenu() {
      const menu = document.getElementById('menu');
      menu.classList.toggle('hidden');
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        document.getElementById('menu').classList.add('hidden');
      }
    });

    window.onload = () => { createParticles(); };
  </script>
</body>
</html>
